<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASOCITECH · Registro Científico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 850px;
        }
        
        .card {
            background: rgba(12, 20, 28, 0.97);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 35px;
            border: 1px solid rgba(0, 255, 170, 0.25);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 255, 170, 0.1) inset;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #00ffaa;
            font-size: 2.4em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 25px rgba(0, 255, 170, 0.6);
            margin-bottom: 8px;
        }
        
        .header p {
            color: #88aaff;
            font-size: 1.1em;
            font-weight: 400;
            letter-spacing: 1px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }
        
        .full-width {
            grid-column: span 2;
        }
        
        .form-group {
            margin-bottom: 5px;
        }
        
        .form-group label {
            display: block;
            color: #b0d0ff;
            font-size: 0.9em;
            font-weight: 500;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        
        /* ESTILO ÚNICO PARA TODOS LOS CAMPOS */
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            background: #0e1a26 !important;
            border: 1.5px solid #1e3b4f !important;
            border-radius: 16px !important;
            color: #ffffff !important;
            font-size: 1em;
            font-weight: 400;
            transition: all 0.25s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3) !important;
            outline: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }
        
        /* Placeholders en azul grisáceo */
        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #7f9fbf !important;
            opacity: 1;
            font-weight: 400;
        }
        
        /* Focus state - todos los campos brillan igual */
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #00ffaa !important;
            box-shadow: 0 0 0 3px rgba(0, 255, 170, 0.2), 0 4px 12px rgba(0, 0, 0, 0.5) !important;
            background: #0f1c2a !important;
        }
        
        /* Estilo específico para selects */
        .form-group select {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2388aaff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 18px center;
            background-size: 16px;
            cursor: pointer;
        }
        
        /* Opciones de los selects */
        .form-group select option {
            background: #0e1a26 !important;
            color: #ffffff !important;
            padding: 12px !important;
            font-size: 1em;
        }
        
        /* Textarea específico */
        .form-group textarea {
            min-height: 85px;
            resize: vertical;
            line-height: 1.5;
        }
        
        /* Título de sección */
        .section-title {
            grid-column: span 2;
            color: #00ccff;
            font-size: 1.3em;
            font-weight: 600;
            margin: 15px 0 10px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #1e4a6a;
            text-shadow: 0 0 10px rgba(0, 200, 255, 0.3);
        }
        
        /* Botón principal */
        .btn-submit {
            grid-column: span 2;
            background: linear-gradient(145deg, #00ddaa, #0099ff);
            color: #000;
            border: none;
            padding: 18px 25px;
            border-radius: 40px;
            font-size: 1.3em;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px -5px rgba(0, 255, 170, 0.4);
        }
        
        .btn-submit:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 35px -5px #00ffaa;
            background: linear-gradient(145deg, #00ffaa, #00aaff);
        }
        
        .btn-submit:active {
            transform: translateY(0) scale(0.98);
        }
        
        /* Indicador de campo requerido */
        .required::after {
            content: " *";
            color: #ff6666;
            font-weight: 700;
            font-size: 1.1em;
        }
        
        /* Responsive */
        @media (max-width: 650px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full-width, .section-title, .btn-submit {
                grid-column: span 1;
            }
            .card {
                padding: 25px;
            }
            .header h1 {
                font-size: 1.8em;
            }
        }
        
        /* Estilo para números (quitar flechas) */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        
        /* Pequeño detalle decorativo */
        .form-group {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🔬 ASOCITECH MONTES</h1>
                <p>Registro de Talentos Científicos 2025</p>
            </div>
            
            <form action="/registrar" method="post">
                <div class="form-grid">
                    <!-- ESTUDIANTE -->
                    <div class="full-width">
                        <div class="form-group">
                            <label class="required">Nombre Completo del Estudiante</label>
                            <input type="text" name="nombre" placeholder="Ej: MARÍA GONZÁLEZ" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Cédula</label>
                        <input type="text" name="cedula" placeholder="Ej: 28123456" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Teléfono Estudiante</label>
                        <input type="text" name="telefono_est" placeholder="Ej: 04121234567" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Edad</label>
                        <input type="number" name="edad" min="4" max="20" placeholder="4-20 años" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Sexo</label>
                        <select name="sexo" required>
                            <option value="" disabled selected>Selecciona una opción</option>
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                        </select>
                    </div>
                    
                    <div class="full-width">
                        <div class="form-group">
                            <label class="required">Liceo / Escuela</label>
                            <input type="text" name="liceo" placeholder="Ej: U.E. MONTES" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Año</label>
                        <input type="text" name="ano" placeholder="Ej: 4to, 5to" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Sección</label>
                        <input type="text" name="seccion" placeholder="Ej: A, ÚNICA" required>
                    </div>
                    
                    <div class="full-width">
                        <div class="form-group">
                            <label class="required">¿Qué te gusta de la ciencia?</label>
                            <textarea name="interes" placeholder="Cuéntanos tu interés científico..." required></textarea>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Nivel</label>
                        <select name="nivel" required>
                            <option value="" disabled selected>Selecciona tu nivel</option>
                            <option value="Principiante">🌱 Principiante</option>
                            <option value="Intermedio">📘 Intermedio</option>
                            <option value="Avanzado">⚡ Avanzado</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">¿Ferias?</label>
                        <select name="feria" required>
                            <option value="" disabled selected>Selecciona</option>
                            <option value="No">No, primera vez</option>
                            <option value="Si">Sí, ya participé</option>
                        </select>
                    </div>
                    
                    <div class="full-width">
                        <div class="form-group">
                            <label>Grupo (opcional)</label>
                            <input type="text" name="grupo" placeholder="Ej: ROBÓTICA, CIENCIAS, etc.">
                        </div>
                    </div>
                    
                    <!-- REPRESENTANTE -->
                    <div class="section-title">📞 DATOS DEL REPRESENTANTE</div>
                    
                    <div class="full-width">
                        <div class="form-group">
                            <label class="required">Nombre del representante</label>
                            <input type="text" name="rep_nombre" placeholder="Ej: CARLOS PÉREZ" required>
                        </div>
                    </div>
                    
                    <div class="full-width">
                        <div class="form-group">
                            <label class="required">Teléfono del representante</label>
                            <input type="text" name="rep_tel" placeholder="Ej: 04121234567" required>
                        </div>
                    </div>
                    
                    <!-- BOTÓN -->
                    <button type="submit" class="btn-submit">🚀 INSCRIBIRME AHORA</button>
                </div>
            </form>
        </div>
    </div>
</body>
    </html>
