<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASOCITECH · Registro Científico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
        }
        
        .card {
            background: rgba(20, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 35px;
            border: 1px solid rgba(0, 255, 170, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #00ffaa;
            font-size: 2.2em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0, 255, 170, 0.5);
        }
        
        .header p {
            color: #88aaff;
            margin-top: 8px;
            font-size: 1.1em;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .full-width {
            grid-column: span 2;
        }
        
        .form-group {
            margin-bottom: 5px;
        }
        
        .form-group label {
            display: block;
            color: #aaccff;
            font-size: 0.9em;
            font-weight: 500;
            margin-bottom: 5px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(10, 20, 30, 0.7);
            border: 1px solid #2a3a4a;
            border-radius: 12px;
            color: white;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00ffaa;
            box-shadow: 0 0 10px rgba(0, 255, 170, 0.3);
        }
        
        .section-title {
            grid-column: span 2;
            color: #00ccff;
            font-size: 1.2em;
            font-weight: 600;
            margin: 10px 0 5px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid #2a4a5a;
        }
        
        .btn-submit {
            grid-column: span 2;
            background: linear-gradient(45deg, #00cc88, #00aaff);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-size: 1.2em;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }
        
        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0, 255, 170, 0.6);
        }
        
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full-width, .section-title, .btn-submit {
                grid-column: span 1;
            }
        }
        
        .required::after {
            content: " *";
            color: #ff5566;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🔬 ASOCITECH MONTES</h1>
                <p>Registro de Talentos Científicos 2025</p>
            </div>
            
            <form action="/registrar" method="post">
                <div class="form-grid">
                    <div class="full-width">
                        <label class="required">Nombre Completo del Estudiante</label>
                        <input type="text" name="nombre" placeholder="Ej: MARÍA GONZÁLEZ" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Cédula</label>
                        <input type="text" name="cedula" placeholder="Ej: 28123456" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Teléfono Estudiante</label>
                        <input type="text" name="telefono_est" placeholder="Ej: 04121234567" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Edad</label>
                        <input type="number" name="edad" min="4" max="20" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Sexo</label>
                        <select name="sexo" required>
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                        </select>
                    </div>
                    
                    <div class="full-width">
                        <label class="required">Liceo / Escuela</label>
                        <input type="text" name="liceo" placeholder="Ej: U.E. MONTES" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Año</label>
                        <input type="text" name="ano" placeholder="Ej: 4to" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Sección</label>
                        <input type="text" name="seccion" placeholder="Ej: A" required>
                    </div>
                    
                    <div class="full-width">
                        <label class="required">¿Qué te gusta de la ciencia?</label>
                        <textarea name="interes" rows="2" required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">Nivel</label>
                        <select name="nivel" required>
                            <option value="Principiante">🌱 Principiante</option>
                            <option value="Intermedio">📘 Intermedio</option>
                            <option value="Avanzado">⚡ Avanzado</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="required">¿Participado en ferias?</label>
                        <select name="feria" required>
                            <option value="No">No</option>
                            <option value="Si">Sí</option>
                        </select>
                    </div>
                    
                    <div class="full-width">
                        <label>Grupo (opcional)</label>
                        <input type="text" name="grupo" placeholder="Ej: ROBÓTICA">
                    </div>
                    
                    <div class="section-title">📞 DATOS DEL REPRESENTANTE</div>
                    
                    <div class="full-width">
                        <label class="required">Nombre del representante</label>
                        <input type="text" name="rep_nombre" required>
                    </div>
                    
                    <div class="full-width">
                        <label class="required">Teléfono del representante</label>
                        <input type="text" name="rep_tel" placeholder="Ej: 04121234567" required>
                    </div>
                    
                    <button type="submit" class="btn-submit">🚀 INSCRIBIRME</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
